name: Day Mode (Switch to Azure)

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  switch-to-azure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update vercel.json to Azure
        run: |
          sed -i 's|destination": ".*/api/:path\*"|destination": "http://40.81.243.62:5000/api/:path*"|' client/vercel.json
          cat client/vercel.json # Log the change for debugging

      - name: Commit and Push
        run: |
          git config --global user.name "Deployment automation"
          git config --global user.email "bot@nodues.com"
          git add client/vercel.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Day Mode: Switched server to Azure VM"
            git push
          fi
