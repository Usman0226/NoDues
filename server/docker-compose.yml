services:
  api:
    build: .
    restart: always
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
